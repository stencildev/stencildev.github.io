site_name: Stencil Dev
site_description: Personal infrastructure portfolio and technical notes
site_url: https://dstencil.com

theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - navigation.footer
  # Dark Mode
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to Light Mode
      primary: black
      accent: indigo

  # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to Dark Mode
      primary: black
      accent: indigo

nav:
  - Home: index.md
  - About: about.md
  - Projects: projects.md
  - Homelab: 
      - Overview: homelab/index.md
      - Architecture: homelab/architecture.md
      - Workflow: homelab/workflow.md
      - Networking: homelab/networking.md
      - DNS: homelab/dns.md
      - Reverse Proxy: homelab/reverse-proxy.md
  - Runbooks: 
      - Overview: runbooks/index.md
      - Site Deployment Workflow: runbooks/site-deployment.md 
      - Traefik Deployment: runbooks/traefik-deployment.md
  - Contact: contact.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - md_in_html

extra:
  social:
    - icon: material/linkedin
      link: https://www.linkedin.com/in/damion-stencil-64459b62
    - icon: material/github
      link: https://github.com/stencildev
  
  generator: false